<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>Calm</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="dark">

  <!-- iOS Status Bar -->
  <div class="status-bar">
    <span class="status-time" id="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor">
        <rect x="0" y="3" width="3" height="9" rx="1" opacity="0.3"/>
        <rect x="4.5" y="2" width="3" height="10" rx="1" opacity="0.5"/>
        <rect x="9" y="0" width="3" height="12" rx="1" opacity="0.7"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor">
        <path d="M8 2.4C10.4 2.4 12.5 3.4 14 5L15.5 3.5C13.6 1.3 11 0 8 0C5 0 2.4 1.3 0.5 3.5L2 5C3.5 3.4 5.6 2.4 8 2.4Z" opacity="0.3"/>
        <path d="M8 5.2C9.7 5.2 11.2 5.9 12.3 7L13.8 5.5C12.3 3.9 10.3 3 8 3C5.7 3 3.7 3.9 2.2 5.5L3.7 7C4.8 5.9 6.3 5.2 8 5.2Z" opacity="0.6"/>
        <path d="M8 8C9 8 9.9 8.4 10.6 9.1L8 12L5.4 9.1C6.1 8.4 7 8 8 8Z"/>
      </svg>
      <div class="battery">
        <div class="battery-fill" style="width:78%"></div>
      </div>
    </div>
  </div>

  <!-- Tab content wrapper -->
  <div class="screen" id="screen-home">

    <!-- Navigation bar -->
    <div class="nav-bar">
      <span class="nav-title">Calm</span>
      <button class="nav-btn" id="theme-btn" aria-label="Toggle theme">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
      </button>
    </div>

    <!-- Main breathe view -->
    <main class="breathe-view">

      <p class="breathe-label" id="phase-label">Ready</p>

      <!-- Breathing circle -->
      <div class="circle-stage">
        <div class="circle-ring ring-3"></div>
        <div class="circle-ring ring-2"></div>
        <div class="circle-ring ring-1"></div>
        <div id="breath-circle">
          <span id="timer"></span>
        </div>
      </div>

      <!-- Timing knobs -->
      <div class="knobs-grid">
        <div class="knob-item">
          <span class="knob-label">Inhale</span>
          <div class="knob-stepper">
            <button class="step-btn" data-phase="0" data-dir="-1">−</button>
            <span class="step-val" id="val-0">4</span>
            <button class="step-btn" data-phase="0" data-dir="1">+</button>
          </div>
          <span class="knob-unit">sec</span>
        </div>
        <div class="knob-item">
          <span class="knob-label">Hold In</span>
          <div class="knob-stepper">
            <button class="step-btn" data-phase="1" data-dir="-1">−</button>
            <span class="step-val" id="val-1">4</span>
            <button class="step-btn" data-phase="1" data-dir="1">+</button>
          </div>
          <span class="knob-unit">sec</span>
        </div>
        <div class="knob-item">
          <span class="knob-label">Exhale</span>
          <div class="knob-stepper">
            <button class="step-btn" data-phase="2" data-dir="-1">−</button>
            <span class="step-val" id="val-2">6</span>
            <button class="step-btn" data-phase="2" data-dir="1">+</button>
          </div>
          <span class="knob-unit">sec</span>
        </div>
        <div class="knob-item">
          <span class="knob-label">Hold Out</span>
          <div class="knob-stepper">
            <button class="step-btn" data-phase="3" data-dir="-1">−</button>
            <span class="step-val" id="val-3">0</span>
            <button class="step-btn" data-phase="3" data-dir="1">+</button>
          </div>
          <span class="knob-unit">sec</span>
        </div>
      </div>

      <!-- Sound selector -->
      <div class="sound-row">
        <button class="sound-pill" data-sound="rain">
          <span class="sound-icon">🌧</span>
          <span>Rain</span>
        </button>
        <button class="sound-pill" data-sound="bowl">
          <span class="sound-icon">🔔</span>
          <span>Bowl</span>
        </button>
      </div>

      <!-- Primary action -->
      <button id="start-btn" class="primary-btn">
        <span class="btn-label">Begin</span>
      </button>

    </main>
  </div>

  <!-- History screen -->
  <div class="screen hidden" id="screen-history">
    <div class="nav-bar">
      <span class="nav-title">Sessions</span>
    </div>
    <div class="history-view">
      <div class="streak-card">
        <div class="streak-num" id="streak-count">0</div>
        <div class="streak-label">day streak</div>
      </div>
      <ul id="session-list" class="session-list"></ul>
    </div>
  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar">
    <button class="tab active" data-tab="home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 2C6.48 2 2 8 2 12s4.48 10 10 10 10-4.48 10-10C22 8 17.52 2 12 2Z" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <span>Breathe</span>
    </button>
    <button class="tab" data-tab="history">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2Z"/>
        <path d="M12 6v6l4 2" stroke-linecap="round"/>
      </svg>
      <span>History</span>
    </button>
  </nav>

  <script src="app.js"></script>
  <script>
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        tab.classList.add('active');
        document.getElementById('screen-' + target).classList.remove('hidden');
        // Update streak when switching to history
        if (target === 'history') updateStreak();
      });
    });

    // Live clock for status bar
    function updateClock() {
      const now = new Date();
      let h = now.getHours(), m = now.getMinutes();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('status-time').textContent =
        h + ':' + String(m).padStart(2, '0') + ' ' + ampm;
    }
    updateClock();
    setInterval(updateClock, 10000);

    // Streak calculation
    function updateStreak() {
      const sessions = window.getHistory ? window.getHistory() : [];
      if (!sessions.length) { document.getElementById('streak-count').textContent = '0'; return; }
      const days = new Set(sessions.map(s => new Date(s.date).toDateString()));
      let streak = 0, d = new Date();
      while (days.has(d.toDateString())) {
        streak++;
        d.setDate(d.getDate() - 1);
      }
      document.getElementById('streak-count').textContent = streak;
    }
  </script>
</body>
</html>
