<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calm — Desktop</title>
  <link rel="stylesheet" href="desktop.css">
</head>
<body data-theme="dark">

  <div class="app-shell">

    <!-- ── Left Sidebar ────────────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="logo">
          <div class="logo-mark"></div>
          <span class="logo-text">Calm</span>
        </div>

        <nav class="side-nav">
          <button class="nav-item active" data-view="breathe">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="12" r="10"/>
              <circle cx="12" cy="12" r="4"/>
            </svg>
            <span>Breathe</span>
          </button>
          <button class="nav-item" data-view="history">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 6v6l4 2" stroke-linecap="round"/>
            </svg>
            <span>History</span>
          </button>
        </nav>
      </div>

      <div class="sidebar-bottom">
        <!-- Keyboard hint -->
        <div class="kb-hint">
          <kbd>Space</kbd>
          <span>Start / Stop</span>
        </div>
        <button class="theme-toggle" id="theme-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
          <span id="theme-label">Light mode</span>
        </button>
      </div>
    </aside>

    <!-- ── Center — Breathe Panel ──────────────────────────────────────── -->
    <main class="center-panel" id="view-breathe">

      <div class="center-inner">
        <p class="phase-text" id="phase-label">Ready to breathe</p>

        <!-- Circle -->
        <div class="circle-stage">
          <div class="circle-ring ring-4"></div>
          <div class="circle-ring ring-3"></div>
          <div class="circle-ring ring-2"></div>
          <div class="circle-ring ring-1"></div>
          <div id="breath-circle">
            <span id="timer"></span>
          </div>
        </div>

        <!-- Sound controls -->
        <div class="sound-row">
          <button class="sound-chip" data-sound="rain">
            <span>🌧</span> Rain
          </button>
          <button class="sound-chip" data-sound="bowl">
            <span>🔔</span> Bowl
          </button>
          <button class="sound-chip" data-sound="forest">
            <span>🌿</span> Forest
          </button>
        </div>

        <!-- CTA -->
        <button id="start-btn" class="begin-btn">
          <span class="btn-label">Begin</span>
          <span class="btn-sub">4 · 4 · 6 pattern</span>
        </button>
      </div>
    </main>

    <!-- ── Right Panel — Controls + History ───────────────────────────── -->
    <aside class="right-panel" id="view-history">

      <!-- Timing knobs -->
      <section class="panel-section">
        <h3 class="section-title">Breath Pattern</h3>
        <div class="knobs-grid">
          <div class="knob-item" id="knob-0">
            <span class="knob-label">Inhale</span>
            <div class="knob-ctrl">
              <button class="step-btn" data-phase="0" data-dir="-1">−</button>
              <span class="step-val" id="val-0">4</span>
              <button class="step-btn" data-phase="0" data-dir="1">+</button>
            </div>
            <span class="knob-unit">sec</span>
          </div>
          <div class="knob-item" id="knob-1">
            <span class="knob-label">Hold In</span>
            <div class="knob-ctrl">
              <button class="step-btn" data-phase="1" data-dir="-1">−</button>
              <span class="step-val" id="val-1">4</span>
              <button class="step-btn" data-phase="1" data-dir="1">+</button>
            </div>
            <span class="knob-unit">sec</span>
          </div>
          <div class="knob-item" id="knob-2">
            <span class="knob-label">Exhale</span>
            <div class="knob-ctrl">
              <button class="step-btn" data-phase="2" data-dir="-1">−</button>
              <span class="step-val" id="val-2">6</span>
              <button class="step-btn" data-phase="2" data-dir="1">+</button>
            </div>
            <span class="knob-unit">sec</span>
          </div>
          <div class="knob-item knob-off" id="knob-3">
            <span class="knob-label">Hold Out</span>
            <div class="knob-ctrl">
              <button class="step-btn" data-phase="3" data-dir="-1">−</button>
              <span class="step-val" id="val-3">0</span>
              <button class="step-btn" data-phase="3" data-dir="1">+</button>
            </div>
            <span class="knob-unit">sec</span>
          </div>
        </div>
      </section>

      <!-- Stats bar -->
      <section class="panel-section">
        <h3 class="section-title">Sessions</h3>
        <div class="stats-row">
          <div class="stat-card">
            <span class="stat-num" id="stat-total">0</span>
            <span class="stat-label">Total</span>
          </div>
          <div class="stat-card">
            <span class="stat-num" id="stat-streak">0</span>
            <span class="stat-label">Day Streak</span>
          </div>
          <div class="stat-card">
            <span class="stat-num" id="stat-mins">0</span>
            <span class="stat-label">Minutes</span>
          </div>
        </div>
      </section>

      <!-- History list -->
      <section class="panel-section history-section">
        <div class="section-header">
          <h3 class="section-title">Recent</h3>
          <button class="clear-btn" id="clear-history">Clear all</button>
        </div>
        <ul id="session-list" class="session-list"></ul>
      </section>

    </aside>

  </div>

  <script src="app.js"></script>
  <script>
    // ── View switching (sidebar nav) ─────────────────────────────────────
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        item.classList.add('active');
        // On narrow screens only — desktop shows both panels always
        if (window.innerWidth < 900) {
          const view = item.dataset.view;
          document.getElementById('view-breathe').classList.toggle('hidden', view !== 'breathe');
          document.getElementById('view-history').classList.toggle('hidden', view !== 'history');
        }
      });
    });

    // ── Theme toggle ─────────────────────────────────────────────────────
    const themeBtn = document.getElementById('theme-btn');
    const themeLabel = document.getElementById('theme-label');

    function applyTheme(t) {
      document.body.dataset.theme = t;
      themeLabel.textContent = t === 'dark' ? 'Light mode' : 'Dark mode';
      localStorage.setItem('meditation_theme', t);
    }

    themeBtn.addEventListener('click', () => {
      applyTheme(document.body.dataset.theme === 'dark' ? 'light' : 'dark');
    });

    // Restore
    applyTheme(localStorage.getItem('meditation_theme') || 'dark');

    // ── Keyboard shortcut ─────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && e.target.tagName !== 'BUTTON') {
        e.preventDefault();
        document.getElementById('start-btn').click();
      }
    });

    // ── Stats ─────────────────────────────────────────────────────────────
    function updateStats() {
      const sessions = window.getHistory ? window.getHistory() : [];
      document.getElementById('stat-total').textContent = sessions.length;

      const totalSecs = sessions.reduce((s, x) => s + (x.duration_seconds || 0), 0);
      document.getElementById('stat-mins').textContent = Math.floor(totalSecs / 60);

      const days = new Set(sessions.map(s => new Date(s.date).toDateString()));
      let streak = 0, d = new Date();
      while (days.has(d.toDateString())) { streak++; d.setDate(d.getDate() - 1); }
      document.getElementById('stat-streak').textContent = streak;
    }

    // ── Update button sub-label with current pattern ───────────────────
    function updateBtnSub() {
      if (!window.phaseDurations) return;
      const active = window.phaseDurations.filter(d => d > 0);
      document.querySelector('.btn-sub').textContent = active.join(' · ') + ' pattern';
    }

    // ── Clear history ─────────────────────────────────────────────────────
    document.getElementById('clear-history').addEventListener('click', () => {
      if (!confirm('Clear all session records?')) return;
      localStorage.removeItem('meditation_sessions');
      if (window.renderHistory) window.renderHistory();
      updateStats();
    });

    // ── Init ──────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      updateStats();
      // Re-run stats after each session stop
      const origStop = window.stopSession;
      if (origStop) {
        window.stopSession = function() {
          origStop();
          setTimeout(() => { updateStats(); updateBtnSub(); }, 100);
        };
      }
    });

    // Patch knob steppers to update btn-sub label
    document.querySelectorAll('.step-btn').forEach(btn => {
      btn.addEventListener('click', () => setTimeout(updateBtnSub, 50));
    });
  </script>
</body>
</html>
